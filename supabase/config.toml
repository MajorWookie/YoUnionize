project_id = "union"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["http://localhost:8081"]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "50MiB"

[analytics]
enabled = false

# Edge Functions — disable gateway JWT verification for new publishable API keys
# (sb_publishable_* keys are opaque, not JWTs). Auth-protected functions use
# ensureAuth() internally via supabase.auth.getUser() instead.
[functions.ask]
verify_jwt = false
[functions.batch-fetch]
verify_jwt = false
[functions.companies-lookup]
verify_jwt = false
[functions.companies-search]
verify_jwt = false
[functions.companies-search-sec]
verify_jwt = false
[functions.company-detail]
verify_jwt = false
[functions.company-fetch]
verify_jwt = false
[functions.company-process]
verify_jwt = false
[functions.company-summarize]
verify_jwt = false
[functions.company-summary-status]
verify_jwt = false
[functions.compensation-fairness]
verify_jwt = false
[functions.health]
verify_jwt = false
[functions.job-status]
verify_jwt = false
[functions.user-cost-of-living]
verify_jwt = false
[functions.user-me]
verify_jwt = false
[functions.user-profile]
verify_jwt = false
